<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
    <h1>Login</h1>
    <form method="POST">
        <div class="glass-panel">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="ai-btn">Login</button>
        </div>
        <p>Don't have an account? <a href="{{ url_for('signup') }}" style="color:#00ffff;">Sign Up</a></p>
    </form>
</div>
</body>
</html>
